<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 32" fill="none" class="h-8 w-auto max-w-[140px] object-contain object-left" aria-label="Avantiy">
  <!-- Geometric icon: stylized A with three diagonal bands and transparent gaps -->
  <g fill="#7A2DD6">
    <!-- Left band: top-left to bottom-center -->
    <path d="M0 1 L5 1 L24 32 L19 32 Z"/>
    <!-- Right band: top-right to bottom-center (mirrors left) -->
    <path d="M35 1 L40 1 L21 32 L16 32 Z"/>
    <!-- Central band: crossbar intersecting both legs, slightly wider -->
    <path d="M12 13 L28 13 L28 19 L12 19 Z"/>
  </g>
  <!-- Wordmark "Avantiy" -->
  <text x="48" y="23" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="700" font-size="19" fill="#FFFFFF">Avantiy</text>
  <!-- Purple dot over 'i' -->
  <circle cx="101" cy="9" r="2.4" fill="#7A2DD6"/>
</svg>
